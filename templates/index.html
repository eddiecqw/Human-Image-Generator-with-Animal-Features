<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human-Animal Fusion - AI Chat</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .chat-container {
      width: 100%;
      max-width: 640px;
      height: 90vh;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #007bff;
      color: white;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-header small {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.9;
    }

    .chat-log {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #ffffff;
    }

    .message {
      max-width: 85%;
      padding: 10px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 15px;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .user-message {
      align-self: flex-end;
      background: #007bff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot-message {
      align-self: flex-start;
      background: #e9e9eb;
      color: #1c1c1c;
      border-bottom-left-radius: 4px;
    }

    .bot-message img {
      display: block;
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 10px 16px;
      background: #e9e9eb;
      border-radius: 18px;
      align-self: flex-start;
      width: fit-content;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
      }

      40% {
        transform: translateY(-6px);
      }
    }

    .input-area {
      border-top: 1px solid #ddd;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      background: #ffffff;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 24px;
      outline: none;
      font-size: 15px;
    }

    .input-area input:focus {
      border-color: #007bff;
    }

    .input-area button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
    }

    .input-area button:disabled {
      background: #88b5e5;
      cursor: not-allowed;
    }

    .hint {
      font-size: 13px;
      color: #666;
      padding: 10px 20px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    @media (max-width: 600px) {
      .chat-container {
        height: 95vh;
      }

      .message {
        max-width: 92%;
      }

      .input-area {
        padding: 10px;
      }

      .input-area button {
        padding: 10px 14px;
      }
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">
      🐾 Human-Animal Fusion AI<br>
      <small>1155192043 CHEN Quanwei</small>
    </div>

    <div class="chat-log" id="chatLog">
      <div class="message bot-message">
        Enter a description and I will generate an image.
      </div>
    </div>

    <div class="hint">
      Tip: GPU generation is much faster than CPU. Example: A young man with cat ears and tail, anime style.
    </div>

    <form class="input-area" id="promptForm">
      <input
        type="text"
        id="description"
        name="description"
        placeholder="e.g., A young man with cat ears and tail"
        autocomplete="off"
        required
      >

      <button type="submit" id="sendBtn">Generate</button>
    </form>
  </div>

  <script>
    const chatLog = document.getElementById("chatLog");
    const form = document.getElementById("promptForm");
    const input = document.getElementById("description");
    const sendBtn = document.getElementById("sendBtn");

    function scrollToBottom() {
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function addMessage(text, sender, imageUrl = null) {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("message");
      msgDiv.classList.add(sender === "user" ? "user-message" : "bot-message");

      const textNode = document.createElement("div");
      textNode.textContent = text;
      msgDiv.appendChild(textNode);

      if (imageUrl) {
        const img = document.createElement("img");
        img.src = imageUrl;
        img.alt = text;
        img.loading = "lazy";

        img.onload = scrollToBottom;
        img.onerror = function () {
          const errorText = document.createElement("div");
          errorText.textContent = "Image failed to load.";
          msgDiv.appendChild(errorText);
        };

        msgDiv.appendChild(img);
      }

      chatLog.appendChild(msgDiv);
      scrollToBottom();
    }

    function showTyping() {
      removeTyping();

      const typingDiv = document.createElement("div");
      typingDiv.classList.add("typing-indicator");
      typingDiv.id = "typingIndicator";

      for (let i = 0; i < 3; i++) {
        const dot = document.createElement("span");
        typingDiv.appendChild(dot);
      }

      chatLog.appendChild(typingDiv);
      scrollToBottom();
    }

    function removeTyping() {
      const typing = document.getElementById("typingIndicator");

      if (typing) {
        typing.remove();
      }
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const prompt = input.value.trim();

      if (!prompt) {
        return;
      }

      addMessage(prompt, "user");

      input.value = "";
      input.disabled = true;
      sendBtn.disabled = true;
      sendBtn.textContent = "Generating";

      showTyping();

      try {
        const formData = new FormData();
        formData.append("description", prompt);

        const response = await fetch("/generate", {
          method: "POST",
          body: formData
        });

        let data;

        try {
          data = await response.json();
        } catch (jsonError) {
          throw new Error("Server did not return valid JSON.");
        }

        if (!response.ok) {
          throw new Error(data.error || "Unknown server error.");
        }

        removeTyping();

        addMessage(
          `Here is your image for: "${data.prompt}"`,
          "bot",
          data.image_path
        );
      } catch (error) {
        removeTyping();
        addMessage(`⚠️ ${error.message}`, "bot");
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        sendBtn.textContent = "Generate";
        input.focus();
      }
    });
  </script>
</body>
</html>
